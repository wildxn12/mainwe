<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wildan Aesthetic Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap');

        /* --- [สไตล์พื้นฐานเดิมของคุณ] --- */
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(20px) brightness(0.4);
            transform: scale(1.1);
            z-index: -1;
        }

        .container {
            width: 340px;
            text-align: center;
            color: white;
            position: relative;
            animation: floating 4s ease-in-out infinite;
            font-family: "Pixelify Sans", sans-serif;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* --- [ระบบการเลื่อนหน้า Slide Up/Down] --- */
        .page {
            position: absolute;
            width: 100%;
            opacity: 0;
            visibility: hidden;
            transition: all 0.8s cubic-bezier(0.65, 0, 0.35, 1);
            pointer-events: none;
        }

        .page.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
            pointer-events: auto;
            z-index: 10;
        }

        .page.exit-up { transform: translateY(-100vh); opacity: 0; }
        .page.exit-down { transform: translateY(100vh); opacity: 0; }
        .page.enter-bottom { transform: translateY(100vh); }
        .page.enter-top { transform: translateY(-100vh); }

        /* --- [Profile Section เดิม] --- */
        .profile-wrapper { position: relative; display: inline-block; }
        .profile-img {
            width: 110px; height: 110px; border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.8);
            margin-bottom: 15px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        .profile-img:hover { transform: scale(1.15) rotate(5deg); box-shadow: 0 0 30px rgba(255, 255, 255, 0.5); }

        /* --- [Education Logo Wrapper - ใหม่ตามคำขอ] --- */
        .edu-logo-wrapper {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.8);
            margin: 0 auto 15px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
        }
        .edu-logo-wrapper:hover {
            transform: scale(1.15) rotate(-5deg);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.1);
        }

        h1 { font-weight: 300; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 25px; text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }
        .tabs { display: flex; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 15px; margin-bottom: 20px; overflow: hidden; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(5px); }
        .tab-btn { flex: 1; padding: 12px; background: transparent; border: none; color: rgba(255, 255, 255, 0.4); cursor: pointer; transition: 0.4s; font-family: "Pixelify Sans", sans-serif; text-transform: uppercase; }
        .tab-btn.active { background: rgba(255, 255, 255, 0.15); color: white; }

        .content-wrapper { height: 220px; position: relative; }
        .pane { position: absolute; top: 0; left: 0; width: 100%; opacity: 0; transform: translateY(20px); visibility: hidden; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .pane.active { opacity: 1; transform: translateY(0); visibility: visible; }

        .info-box { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; margin-bottom: 12px; transition: 0.3s; backdrop-filter: blur(10px); }
        .info-box:hover { background: rgba(255, 255, 255, 0.12); transform: translateX(5px); border-color: rgba(255, 255, 255, 0.3); }

        .socials { display: flex; justify-content: center; gap: 20px; margin-top: 20px; margin-bottom: 20px; }
        .social-icon { width: 45px; height: 45px; border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; text-decoration: none; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); background: rgba(255, 255, 255, 0.05); }
        .social-icon:hover { background: white; color: black; transform: translateY(-5px); }

        /* --- [Education Layout & Timeline รายละเอียดครบ] --- */
        .timeline-container { position: relative; width: 100%; margin-top: 20px; }
        .timeline-container::before { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: rgba(255, 255, 255, 0.1); transform: translateX(-50%); box-shadow: 0 0 15px rgba(255, 255, 255, 0.1); }
        .timeline-item { display: flex; width: 100%; margin-bottom: 30px; position: relative; align-items: center; }
        .dot { position: absolute; left: 50%; width: 10px; height: 10px; background: #fff; border-radius: 50%; transform: translateX(-50%); box-shadow: 0 0 10px #fff; z-index: 5; transition: 0.4s; }
        .edu-card { width: 45%; padding: 12px; background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; backdrop-filter: blur(10px); transition: all 0.4s ease; }
        .timeline-item.right { justify-content: flex-end; }
        .timeline-item.left { justify-content: flex-start; }

        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-30px); filter: blur(5px); } to { opacity: 1; transform: translateX(0); filter: blur(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(30px); filter: blur(5px); } to { opacity: 1; transform: translateX(0); filter: blur(0); } }
        #edu-page.active .timeline-item.left .edu-card { animation: slideInLeft 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) both; }
        #edu-page.active .timeline-item.right .edu-card { animation: slideInRight 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) both; }
        #edu-page.active .timeline-item:nth-child(1) .edu-card { animation-delay: 0.2s; }
        #edu-page.active .timeline-item:nth-child(2) .edu-card { animation-delay: 0.4s; }
        #edu-page.active .timeline-item:nth-child(3) .edu-card { animation-delay: 0.6s; }

        .edu-card:hover { background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.5); transform: scale(1.05); }
        .timeline-item:hover .dot { box-shadow: 0 0 20px #fff, 0 0 40px #fff; transform: translateX(-50%) scale(1.5); }

        /* --- [Loader] --- */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 1s; }
        .dino { font-size: 35px; position: absolute; bottom: 45px; left: 0; animation: jump 0.6s infinite alternate; }
        @keyframes jump { from { transform: translateY(0); } to { transform: translateY(-15px); } }
        .progress-bar { width: 250px; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .progress-fill { width: 0%; height: 100%; background: #fff; box-shadow: 0 0 15px #fff; border-radius: 10px; }
    </style>
</head>

<body>

    <div id="loader">
        <div style="width: 250px; position: relative; text-align: center;">
            <div class="dino">♥</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <p style="color: white; margin-top: 20px; font-size: 12px; letter-spacing: 3px;">INITIALIZING <span id="percent">0%</span></p>
        </div>
    </div>

    <video autoplay muted loop playsinline class="video-bg">
        <source src="From KlickPin CF Recreate these cozy ways to style your holiday treat you’ll want to recreate this weekend with aesthetic touches that photograph beautifully and - Pin-1068760555340972067.mp4" type="video/mp4">
    </video>

    <div class="container">

        <div id="main-page" class="page active">
            <div class="profile-wrapper">
                <img src="https://i.pinimg.com/736x/2b/ba/17/2bba1708d184a6e86ed3198df5fa71ac.jpg" class="profile-img">
            </div>
            <h1>Wildan</h1>
            <div class="tabs">
                <button id="b1" class="tab-btn active" onclick="showTab('over')">Overview</button>
                <button id="b2" class="tab-btn" onclick="showTab('about')">About Me</button>
            </div>
            <div class="content-wrapper">
                <div id="over" class="pane active">
                    <div class="info-box"><span><i class="fa-solid fa-user" style="color:#ff4d94;"></i> Name</span><b>Wildan</b></div>
                    <div class="info-box"><span><i class="fa-solid fa-calendar" style="color:#00f2ff;"></i> Age</span><b>16</b></div>
                    <div class="info-box"><span><i class="fas fa-code" style="color:#adff2f;"></i> Work</span><b>Coding</b></div>
                </div>
                <div id="about" class="pane">
                    <div class="info-box" style="text-align:left; font-size:14px; line-height:1.6;">
                        <p>สวัสดีครับ! ผมเป็นนักพัฒนาวัย 16 ปีที่หลงใหลในการเขียนโค้ดและสร้างสรรค์ผลงาน Aesthetic ครับ</p>
                    </div>
                </div>
            </div>
            <div class="socials">
                <a href="https://www.facebook.com/wildann.226404" target="_blank" class="social-icon"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.tiktok.com/@never9438" target="_blank" class="social-icon"><i class="fab fa-tiktok"></i></a>
                <a href="https://www.instagram.com/wxldan__sa" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
            </div>
            <button class="tab-btn" style="font-size: 10px; letter-spacing: 2px;" onclick="goToEducation()">
                GO TO EDUCATION <br> <i class="fa-solid fa-chevron-down"></i>
            </button>
        </div>

        <div id="edu-page" class="page enter-bottom">
            <div class="edu-logo-wrapper">
                <i class="fa-solid fa-graduation-cap" style="font-size: 50px; color: white;"></i>
            </div>
            <h2 style="letter-spacing: 5px; margin-top: 10px; text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);">EDUCATION</h2>

            <div class="timeline-container">
                <div class="timeline-item right">
                    <div class="dot"></div>
                    <div class="edu-card">
                        <b style="color: #ff4d94;">School 1</b>
                        <p style="font-size: 10px;">Primary Education</p>
                    </div>
                </div>
                <div class="timeline-item left">
                    <div class="dot"></div>
                    <div class="edu-card">
                        <b style="color: #00f2ff;">School 2</b>
                        <p style="font-size: 10px;">Junior High School</p>
                    </div>
                </div>
                <div class="timeline-item right">
                    <div class="dot"></div>
                    <div class="edu-card">
                        <b style="color: #adff2f;">School 3</b>
                        <p style="font-size: 10px;">Senior High School</p>
                    </div>
                </div>
            </div>
            <button class="tab-btn" style="font-size: 10px; margin-top: 25px;" onclick="backToProfile()">
                <i class="fa-solid fa-chevron-up"></i> <br> BACK TO PROFILE
            </button>
        </div>
    </div>

    <script>
        function showTab(name) {
            const panes = document.querySelectorAll('.pane');
            const btns = document.querySelectorAll('.tab-btn');
            panes.forEach(p => p.classList.remove('active'));
            btns.forEach(b => { if(b.id === 'b1' || b.id === 'b2') b.classList.remove('active'); });
            document.getElementById(name).classList.add('active');
            if (name === 'over') document.getElementById('b1').classList.add('active');
            else document.getElementById('b2').classList.add('active');
        }

        function goToEducation() {
            const main = document.getElementById('main-page');
            const edu = document.getElementById('edu-page');
            main.classList.remove('active');
            main.classList.add('exit-up');
            edu.classList.remove('exit-up', 'exit-down', 'enter-top');
            edu.classList.add('enter-bottom');
            setTimeout(() => { edu.classList.add('active'); edu.classList.remove('enter-bottom'); }, 50);
        }

        function backToProfile() {
            const main = document.getElementById('main-page');
            const edu = document.getElementById('edu-page');
            edu.classList.remove('active');
            edu.classList.add('exit-down');
            main.classList.remove('exit-up', 'exit-down', 'enter-bottom');
            main.classList.add('enter-top');
            setTimeout(() => { main.classList.add('active'); main.classList.remove('enter-top'); }, 50);
        }

        window.addEventListener('load', () => {
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('loader').style.opacity = '0';
                        setTimeout(() => document.getElementById('loader').style.display = 'none', 1000);
                    }, 500);
                } else {
                    width += Math.floor(Math.random() * 5) + 1;
                    if (width > 100) width = 100;
                    document.getElementById('progressFill').style.width = width + '%';
                    document.getElementById('percent').innerText = width + '%';
                    document.querySelector('.dino').style.left = `calc(${width}% - 20px)`;
                }
            }, 50);
        });
    </script>
</body>
</html>
